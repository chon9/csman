<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2129"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2c443"/>
      <stop offset="1" stop-color="#de9b35"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background with subtle vignette. -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- CS2 letters + MGR strap in the brand accent. -->
  <text x="256" y="240" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="180" font-weight="900" letter-spacing="8"
        fill="url(#ac)">CS2</text>
  <text x="256" y="330" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="70" font-weight="800" letter-spacing="14"
        fill="#e4e7ee">MGR</text>
  <!-- Little scope crosshair bottom-centre for the CS reference. -->
  <g transform="translate(256 420)" fill="none" stroke="url(#ac)" stroke-width="6" stroke-linecap="round">
    <circle r="34" opacity="0.75"/>
    <line x1="-52" y1="0" x2="-18" y2="0"/>
    <line x1="18"  y1="0" x2="52"  y2="0"/>
    <line x1="0" y1="-52" x2="0" y2="-18"/>
    <line x1="0" y1="18"  x2="0" y2="52"/>
  </g>
</svg>
