<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Offline — CS2 Manager</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0e1218 0%, #0a0d12 100%);
    color: #e4e7ee;
    font-family: -apple-system, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 460px;
    padding: 28px;
    background: #14181f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    box-shadow: 0 20px 48px rgba(0,0,0,0.45);
  }
  h1 {
    color: #de9b35;
    margin: 0 0 8px;
    font-size: 26px;
    letter-spacing: 1px;
  }
  p {
    color: #a3adc0;
    font-size: 14px;
    line-height: 1.55;
    margin: 6px 0;
  }
  button {
    margin-top: 18px;
    background: #de9b35;
    color: #0a0d12;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  button:hover { background: #f2c443; }
  .muted { color: #6b7382; font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>🛰 You're offline</h1>
    <p>CS2 Manager needs a network connection for live matches, market activity, and tournaments.</p>
    <p>The app shell is cached — the moment you're back online, everything should sync in a beat.</p>
    <button onclick="location.reload()">Retry connection</button>
    <div class="muted">Tip: install the app to your home screen for a faster relaunch.</div>
  </div>
</body>
</html>
