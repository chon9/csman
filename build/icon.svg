<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background hex shield -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262c38"/>
      <stop offset="100%" stop-color="#14171c"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb74a"/>
      <stop offset="100%" stop-color="#de9b35"/>
    </linearGradient>
  </defs>

  <!-- rounded square base -->
  <rect x="24" y="24" width="464" height="464" rx="88" ry="88" fill="url(#bg)" stroke="#2a2f3a" stroke-width="6"/>

  <!-- subtle inner hex frame -->
  <polygon points="256,72 432,168 432,344 256,440 80,344 80,168"
           fill="none" stroke="#2e3645" stroke-width="4" stroke-linejoin="round"/>

  <!-- crosshair -->
  <g stroke="url(#acc)" stroke-width="14" stroke-linecap="round" fill="none">
    <!-- outer ring -->
    <circle cx="256" cy="256" r="112" stroke-opacity="0.55"/>
    <!-- ticks -->
    <line x1="256" y1="100" x2="256" y2="160"/>
    <line x1="256" y1="352" x2="256" y2="412"/>
    <line x1="100" y1="256" x2="160" y2="256"/>
    <line x1="352" y1="256" x2="412" y2="256"/>
  </g>

  <!-- center dot -->
  <circle cx="256" cy="256" r="14" fill="url(#acc)"/>

  <!-- CS² lettering -->
  <g font-family="'Segoe UI', 'Inter', sans-serif" font-weight="900" fill="#f5f7fb" text-anchor="middle">
    <text x="256" y="232" font-size="78" letter-spacing="2">CS</text>
    <text x="334" y="206" font-size="44" fill="url(#acc)">2</text>
    <text x="256" y="316" font-size="28" fill="#8b93a3" letter-spacing="6">MANAGER</text>
  </g>
</svg>
